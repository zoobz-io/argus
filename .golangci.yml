version: "2"

run:
  timeout: 5m
  tests: true
  build-tags:
    - integration

linters:
  enable:
    # Security
    - gosec
    - errorlint
    - noctx
    - bodyclose
    - sqlclosecheck
    # Quality
    - govet
    - ineffassign
    - staticcheck
    - unused
    - errcheck
    - errchkjson
    - wastedassign
    # Best practices
    - gocritic
    - revive
    - unconvert
    - dupl
    - goconst
    - godot
    - misspell
    - prealloc
    - copyloopvar

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - funlen
          - goconst
          - dupl
          - govet
      # Admin handlers follow a uniform list/get/delete pattern per entity.
      # The structural similarity is inherent to the rocco handler pattern.
      - path: admin/handlers/(documents|document_versions|watched_paths)\.go
        linters:
          - dupl
      # Stores share cursor-pagination boilerplate across entities.
      - path: stores/(documents|document_versions)\.go
        linters:
          - dupl

  settings:
    errcheck:
      check-type-assertions: true
    govet:
      enable-all: true
    dupl:
      threshold: 150
    goconst:
      min-len: 3
      min-occurrences: 3
