version: "2"

run:
  timeout: 5m
  tests: true
  build-tags:
    - integration
    - testing

linters:
  enable:
    # Security
    - gosec
    - errorlint
    - noctx
    - bodyclose
    - sqlclosecheck
    # Quality
    - govet
    - ineffassign
    - staticcheck
    - unused
    - errcheck
    - errchkjson
    - wastedassign
    # Best practices
    - gocritic
    - revive
    - unconvert
    - dupl
    - goconst
    - godot
    - misspell
    - prealloc
    - copyloopvar

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - funlen
          - goconst
          - dupl
          - govet
      # Admin handlers follow a uniform list/get/delete pattern per entity.
      # The structural similarity is inherent to the rocco handler pattern.
      - path: admin/handlers/(documents|document_versions|watched_paths|tags|topics)\.go
        linters:
          - dupl
      # API handlers follow the same uniform pattern.
      - path: api/handlers/(tags|topics)\.go
        linters:
          - dupl
      # Stores share cursor-pagination boilerplate across entities.
      - path: stores/(documents|document_versions|tags|topics)\.go
        linters:
          - dupl
      # Testing package: mock methods implement interfaces and don't need comments.
      - path: testing/
        linters:
          - revive
      # Test files: unused mock parameters are intentional.
      - path: _test\.go
        linters:
          - revive

  settings:
    errcheck:
      check-type-assertions: true
    govet:
      enable-all: true
    dupl:
      threshold: 150
    goconst:
      min-len: 3
      min-occurrences: 3
