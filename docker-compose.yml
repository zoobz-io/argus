services:
  # =============================================================================
  # Core Infrastructure
  # =============================================================================

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: argus
      POSTGRES_USER: argus
      POSTGRES_PASSWORD: argus
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./tools/dev/init-zitadel-db.sql:/docker-entrypoint-initdb.d/init-zitadel.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U argus"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    image: ghcr.io/kukymbr/goose-docker:latest
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations:ro
    environment:
      GOOSE_DRIVER: postgres
      GOOSE_DBSTRING: "host=postgres port=5432 user=argus password=argus dbname=argus sslmode=disable"
      GOOSE_MIGRATION_DIR: /migrations

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: argus
      MINIO_ROOT_PASSWORD: argusdev
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  opensearch:
    image: opensearchproject/opensearch:2.19.1
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - opensearchdata:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  ocr:
    build:
      context: ./tools/ocr
      dockerfile: Dockerfile
    ports:
      - "50051:50051"
    healthcheck:
      test: ["CMD", "/bin/grpc_health_probe", "-addr=:50051"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =============================================================================
  # Identity
  # =============================================================================

  zitadel:
    image: ghcr.io/zitadel/zitadel:latest
    command: start-from-init --masterkey "01234567890123456789012345678901" --tlsMode disabled
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ZITADEL_DATABASE_POSTGRES_HOST: postgres
      ZITADEL_DATABASE_POSTGRES_PORT: "5432"
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: zitadel
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: zitadel
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      ZITADEL_EXTERNALSECURE: "false"
      ZITADEL_EXTERNALPORT: "8085"
      ZITADEL_EXTERNALDOMAIN: zitadel
      ZITADEL_FIRSTINSTANCE_ORG_NAME: "Argus Dev"
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_USERNAME: admin
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORD: "Admin123!"
    ports:
      - "8085:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # =============================================================================
  # Observability Stack
  # =============================================================================

  # Traces - Jaeger
  jaeger:
    image: jaegertracing/all-in-one:latest
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"  # UI

  # Logs - Loki
  loki:
    image: grafana/loki:latest
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    volumes:
      - lokidata:/loki

  # Metrics - Prometheus
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./tools/dev/prometheus.yaml:/etc/prometheus/prometheus.yml:ro
      - prometheusdata:/prometheus
    ports:
      - "9090:9090"

  # OTEL Collector - Central hub
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    volumes:
      - ./tools/dev/otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4318:4318"    # OTLP HTTP
    depends_on:
      - jaeger
      - loki
      - prometheus

  # Grafana - Unified dashboard (optional but useful)
  grafana:
    image: grafana/grafana:latest
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    ports:
      - "3000:3000"
    volumes:
      - grafanadata:/var/lib/grafana
      - ./tools/dev/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - loki
      - jaeger

  # =============================================================================
  # Application
  # =============================================================================

  app:
    build:
      context: .
      dockerfile: tools/dev/Dockerfile.dev
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      ocr:
        condition: service_healthy
      zitadel:
        condition: service_healthy
    environment:
      APP_PORT: "8080"
      APP_DB_HOST: postgres
      APP_DB_PORT: "5432"
      APP_DB_NAME: argus
      APP_DB_USER: argus
      APP_DB_PASSWORD: argus
      APP_DB_SSLMODE: disable
      APP_REDIS_ADDR: redis:6379
      APP_STORAGE_ENDPOINT: minio:9000
      APP_STORAGE_ACCESS_KEY: argus
      APP_STORAGE_SECRET_KEY: argusdev
      APP_STORAGE_BUCKET: argus
      APP_STORAGE_USE_SSL: "false"
      APP_OPENSEARCH_ADDR: http://opensearch:9200
      APP_OCR_ADDR: ocr:50051
      APP_AUTH_ISSUER: http://zitadel:8080
      APP_AUTH_AUDIENCE: ""
      APP_ENCRYPTION_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: argus
    ports:
      - "8080:8080"
    volumes:
      - .:/app

  notifier:
    build:
      context: .
      dockerfile: tools/dev/Dockerfile.dev
    depends_on:
      redis:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    environment:
      APP_REDIS_ADDR: redis:6379
      APP_OPENSEARCH_ADDR: http://opensearch:9200
      APP_NOTIFIER_CONSUMER_GROUP: argus-notifier
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: argus-notifier
    command: ["go", "run", "./cmd/notifier"]
    volumes:
      - .:/app

volumes:
  pgdata:
  redisdata:
  miniodata:
  opensearchdata:
  lokidata:
  prometheusdata:
  grafanadata:
